name: CI

on:
  pull_request:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.head_ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Lint, Types & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Lint (Biome)
        run: pnpm biome lint

      - name: Type check
        run: pnpm turbo run check-types

      - name: Build all apps
        run: pnpm turbo run build
        env:
          VITE_SUPABASE_URL: http://localhost:54321
          VITE_SUPABASE_PUBLISHABLE_KEY: placeholder
          VITE_CLOUDFLARE_TURNSTILE_SITEKEY: placeholder
          SUPABASE_SERVICE_ROLE_KEY: placeholder
          CLOUDFLARE_TURNSTILE_SECRETKEY: placeholder

  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm --filter @mcmec/auth test:run

  integration-test:
    name: Integration Tests
    runs-on: ubuntu-latest
    if: github.base_ref == 'main' && github.head_ref == 'develop'
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - uses: supabase/setup-cli@v1
        with:
          version: 2.75.0

      - name: Start Supabase and seed data
        run: supabase start && supabase db reset

      - name: Get Supabase keys
        id: supabase-keys
        run: |
          echo "anon_key=$(supabase status -o env | grep ANON_KEY | cut -d= -f2- | sed 's/^\"//; s/\"$//')" >> "$GITHUB_OUTPUT"
          echo "service_role_key=$(supabase status -o env | grep SERVICE_ROLE_KEY | cut -d= -f2- | sed 's/^\"//; s/\"$//')" >> "$GITHUB_OUTPUT"

      - run: pnpm install --frozen-lockfile

      - name: Run integration tests
        run: pnpm --filter @mcmec/auth test:integration
        env:
          SUPABASE_URL: http://127.0.0.1:54321
          SUPABASE_ANON_KEY: ${{ steps.supabase-keys.outputs.anon_key }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ steps.supabase-keys.outputs.service_role_key }}
